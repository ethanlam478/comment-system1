<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純 HTML 任務管理系統 - V2 版 (Google Sheet 同步版)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            500: '#f97316',
                            600: '#ea580c',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .done-item { filter: grayscale(0.9); opacity: 0.6; }
        .strikethrough { text-decoration: line-through; color: #94a3b8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-zinc-50 min-h-screen text-zinc-900 selection:bg-orange-500/30">

    <div class="max-w-2xl mx-auto px-4 py-12">
        <!-- Header & Stats Dashboard -->
        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-zinc-900 flex items-center gap-2">
                    <span class="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center text-white text-lg">✓</span>
                    極簡任務管理 <span class="text-sm font-normal text-zinc-400 ml-2">Simple HTML v2</span>
                </h1>
                <p class="text-zinc-500 mt-1">本地持久化存儲版本 + Google Sheet 雲端備份</p>
            </div>
            
            <div id="stats-panel" class="text-[11px] font-mono text-zinc-400 bg-white px-3 py-2 rounded-xl shadow-sm border border-zinc-100 flex gap-3">
                <!-- Stats will be injected here -->
            </div>
        </header>

        <!-- Input Area -->
        <div class="bg-white p-2 rounded-2xl shadow-sm border border-zinc-100 flex gap-2 mb-8 ring-offset-2 focus-within:ring-2 focus-within:ring-orange-500 transition-all">
            <input 
                type="text" 
                id="task-input" 
                placeholder="你想完成什麼？" 
                class="flex-1 px-4 py-3 outline-none text-zinc-700 bg-transparent"
            >
            <button 
                onclick="handleAddTask()"
                class="bg-orange-500 hover:bg-orange-600 text-white font-bold px-6 py-2 rounded-xl transition-colors shadow-lg shadow-orange-500/20"
            >
                添加
            </button>
        </div>

        <!-- Filters -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex gap-1 overflow-x-auto no-scrollbar py-1">
                <button onclick="setFilter('all')" id="btn-filter-all" class="filter-btn px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-zinc-800 text-white">全部</button>
                <button onclick="setFilter('active')" id="btn-filter-active" class="filter-btn px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-white text-zinc-500 border border-zinc-100 hover:border-orange-200">進行中</button>
                <button onclick="setFilter('done')" id="btn-filter-done" class="filter-btn px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-white text-zinc-500 border border-zinc-100 hover:border-orange-200">已完成</button>
            </div>
            <span class="text-[10px] text-zinc-300 font-medium uppercase tracking-widest">List View</span>
        </div>

        <!-- Task List Container -->
        <div id="task-list" class="space-y-3">
            <!-- Items injected here -->
        </div>
    </div>

    <script>
        // ==================== 組態區 ====================
        let currentFilter = 'all';
        const STORAGE_KEY = 'records';
        
        // ⚠️ 重要：請將下方的 URL 換成您部署 Google Apps Script 後取得的網頁應用程式 URL
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4FGZYRfY_Bn8iWyyfuXr6rrAOy-zbOwvNhZj0TDC2lFedGJXoFobHbq3TAbJbQ8Gq/exec"; // <-- 請貼上您的 Web App URL
        
        // ==================== Google Sheet 同步 Helper ====================
        async function syncToSheet(payload) {
            if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === "https://script.google.com/macros/s/AKfycbx4FGZYRfY_Bn8iWyyfuXr6rrAOy-zbOwvNhZj0TDC2lFedGJXoFobHbq3TAbJbQ8Gq/exec") {
                console.warn("⚠️ Google Sheet URL 尚未設定，跳過同步");
                return;
            }
            
            try {
                console.log("🔄 同步到 Google Sheet:", payload);
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                console.log("✅ Google Sheet 同步成功:", result);
            } catch(error) {
                console.warn("⚠️ Google Sheet 同步失敗 (不影響本機操作):", error);
            }
        }
        
        // ==================== 核心變量與函數 ====================
        
        // 從雲端載入所有資料
        async function loadFromCloud() {
            if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === "https://script.google.com/macros/s/AKfycbx4FGZYRfY_Bn8iWyyfuXr6rrAOy-zbOwvNhZj0TDC2lFedGJXoFobHbq3TAbJbQ8Gq/exec") {
                console.warn("⚠️ Google Sheet URL 尚未設定，無法從雲端載入");
                return null;
            }
            
            try {
                console.log("🔄 正在從 Google Sheet 載入資料...");
                const response = await fetch(APPS_SCRIPT_URL);
                const result = await response.json();
                
                console.log("📡 Google Sheet 回應:", result);
                
                if (result.status === "success" && result.records) {
                    return result.records;
                } else {
                    console.warn("⚠️ 雲端回應異常:", result);
                    return null;
                }
            } catch(error) {
                console.error("❌ 從 Google Sheet 載入失敗:", error);
                return null;
            }
        }
        
        // 初次載入時，若本地無資料則嘗試從雲端載入
        async function initializeData() {
            let localData = loadData();
            
            if (localData.length === 0) {
                const cloudData = await loadFromCloud();
                if (cloudData && cloudData.length > 0) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudData));
                    console.log("📥 已從 Google Sheet 載入", cloudData.length, "筆資料");
                    renderList();  // ✅ 雲端資料回來後重新渲染
                    return;
                }
            }
            
            renderList();  // 本地有資料或雲端無資料時渲染
        }
        
        // 讀取本地 localStorage 資料
        function loadData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }
        
        // 儲存單筆新資料 (localStorage + 雲端同步)
        function saveData(newRecord) {
            const records = loadData();
            records.push(newRecord);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            
            // 雲端同步：新增
            syncToSheet({ action: "create", record: newRecord });
            
            renderList();
        }
        
        // ID 生成器
        function generateId() {
            return Date.now() + "_" + Math.random().toString(36).slice(2, 6);
        }
        
        // 新增任務
        function handleAddTask() {
            const input = document.getElementById('task-input');
            const title = input.value.trim();
            if (!title) return;
            
            const newRecord = {
                id: generateId(),
                createdAt: new Date().toISOString(),
                title: title,
                status: 'active'
            };
            
            saveData(newRecord);
            input.value = '';
        }
        
        // 切換狀態 (修改)
        function toggleStatus(id) {
            const records = loadData();
            let updatedRecord = null;
            
            const updated = records.map(r => {
                if (r.id === id) {
                    const newStatus = r.status === 'active' ? 'done' : 'active';
                    updatedRecord = { ...r, status: newStatus };
                    return updatedRecord;
                }
                return r;
            });
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
            
            // 雲端同步：更新
            if (updatedRecord) {
                syncToSheet({ 
                    action: "update", 
                    id: id, 
                    changes: { status: updatedRecord.status } 
                });
            }
            
            renderList();
        }
        
        // 刪除任務
        function deleteRecord(id) {
            const records = loadData();
            const filtered = records.filter(r => r.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(filtered));
            
            // 雲端同步：刪除
            syncToSheet({ action: "delete", id: id });
            
            renderList();
        }
        
        // 篩選控制
        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-zinc-800', 'bg-orange-500', 'bg-zinc-500', 'text-white');
                btn.classList.add('bg-white', 'text-zinc-500', 'border', 'border-zinc-100');
            });
            
            const activeBtn = document.getElementById(`btn-filter-${type}`);
            activeBtn.classList.remove('bg-white', 'text-zinc-500', 'border');
            if (type === 'all') activeBtn.classList.add('bg-zinc-800', 'text-white');
            if (type === 'active') activeBtn.classList.add('bg-orange-500', 'text-white');
            if (type === 'done') activeBtn.classList.add('bg-zinc-500', 'text-white');
            
            renderList();
        }
        
        // 渲染列表
        function renderList() {
            const listContainer = document.getElementById('task-list');
            const statsContainer = document.getElementById('stats-panel');
            const allRecords = loadData();
            
            const total = allRecords.length;
            const done = allRecords.filter(r => r.status === 'done').length;
            const active = total - done;
            
            statsContainer.innerHTML = `
                <span>ACTIVE: <b class="text-orange-500">${active}</b></span>
                <span class="text-zinc-200">|</span>
                <span>DONE: <b class="text-zinc-500">${done}</b></span>
                <span class="text-zinc-200">|</span>
                <span>TOTAL: <b class="text-zinc-800">${total}</b></span>
            `;
            
            let displayList = allRecords;
            if (currentFilter !== 'all') {
                displayList = allRecords.filter(r => r.status === currentFilter);
            }
            
            displayList.sort((a, b) => {
                const aVal = a.status === 'done' ? 1 : 0;
                const bVal = b.status === 'done' ? 1 : 0;
                return aVal - bVal;
            });
            
            listContainer.innerHTML = displayList.length === 0 
                ? '<div class="py-20 text-center text-zinc-300 text-sm italic">目前沒有任何項目...</div>'
                : displayList.map(item => `
                    <div class="group bg-white p-4 rounded-2xl border border-zinc-100 shadow-sm flex items-center gap-4 transition-all hover:shadow-md ${item.status === 'done' ? 'done-item' : ''}">
                        <button onclick="toggleStatus('${item.id}')" class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors ${item.status === 'done' ? 'bg-green-500 border-green-500 text-white' : 'border-zinc-200 hover:border-orange-500'}">
                            ${item.status === 'done' ? '✓' : ''}
                        </button>
                        
                        <div class="flex-1 min-w-0">
                            <h3 class="font-semibold truncate text-zinc-700 ${item.status === 'done' ? 'strikethrough' : ''}">${escapeHtml(item.title)}</h3>
                            <p class="text-[9px] text-zinc-400 mt-0.5 uppercase tracking-tighter">${new Date(item.createdAt).toLocaleString()}</p>
                        </div>
                        
                        <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="toggleStatus('${item.id}')" class="text-[10px] font-bold text-orange-500 bg-orange-50 px-2 py-1 rounded-lg">
                                ${item.status === 'done' ? '恢復' : '完成'}
                            </button>
                            <button onclick="deleteRecord('${item.id}')" class="text-[10px] font-bold text-red-400 hover:text-red-500 px-2 py-1">
                                刪除
                            </button>
                        </div>
                    </div>
                `).join('');
        }
        
        // 簡易防 XSS 輔助函數
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // 初始化 (先嘗試從雲端載入，若無則使用本地)
        window.onload = function() {
            initializeData();
        };
        
        // 監控 Enter 鍵
        document.getElementById('task-input').onkeydown = (e) => {
            if (e.key === 'Enter') handleAddTask();
        };
    </script>
</body>
</html>
</body>
</html>
